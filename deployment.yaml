apiVersion: apps/v1
kind: Deployment
metadata:
  name: moveinsky-deployment
  labels:
    app: moveinsky
spec:
  replicas: 2
  selector:
    matchLabels:
      app: moveinsky
  template:
    metadata:
      labels:
        app: moveinsky
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: moveinsky
          image: 985059095589.dkr.ecr.us-east-1.amazonaws.com/gitops-agrocd-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: moveinsky-service
spec:
  type: ClusterIp
  selector:
    app: moveinsky
  ports:
  - port: 80
    targetPort: 8501
    protocol: TCP
