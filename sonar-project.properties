# ──────────────────────────────────────────────────────────────────────────────
# SonarQube project configuration — MoveInSync (Python)
# ──────────────────────────────────────────────────────────────────────────────

sonar.projectKey=moveinsync
sonar.projectName=MoveInSync Cab Booking System
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=.
sonar.tests=tests

# Exclusions
sonar.exclusions=tests/**,**/__pycache__/**,**/*.pyc,.git/**,moveinsync.db,*.sh

# Python coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Language
sonar.language=py
sonar.sourceEncoding=UTF-8
